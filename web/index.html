<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Dashboard Météo</title>
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/layout.css" />
  <link rel="stylesheet" href="./css/meteogram.css" />
  <link rel="stylesheet" href="./css/tidecurve.css" />
  <link rel="stylesheet" href="./css/isobar.css" />
  <link rel="stylesheet" href="./css/livewind.css" />
  <link rel="stylesheet" href="./css/bulletin.css" />
  <link rel="stylesheet" href="./css/compare.css" />
  <link rel="stylesheet" href="./css/install.css" />
  <link rel="stylesheet" href="./css/location.css" />
  <link rel="stylesheet" href="./css/settings.css" />
  <link rel="stylesheet" href="./css/rocks.css" />
  <link rel="stylesheet" href="./css/map.css" />
  <link rel="manifest" href="./manifest.webmanifest" />
  <meta name="theme-color" content="#0C447C" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Dashboard Météo" />
  <link rel="icon" type="image/svg+xml" href="./icons/icon.svg" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />
</head>
<body>
  <header class="app-header">
    <div class="app-header__id">
      <button id="header-place" class="app-header__place" type="button"></button>
      <span id="header-datetime" class="app-header__datetime"></span>
    </div>
    <nav class="app-header__actions">
      <button id="btn-refresh" class="iconbtn" type="button" aria-label="Rafraîchir">⟳</button>
      <button id="btn-lang" class="textbtn" type="button">FR</button>
      <button id="btn-settings" class="iconbtn" type="button" aria-label="Thème">☀</button>
      <button id="btn-menu" class="iconbtn" type="button" aria-label="Réglages">☰</button>
    </nav>
  </header>

  <div id="alert-strip" class="alert-strip" hidden></div>

  <main class="stack" id="card-stack"></main>

  <footer class="footer">
    <div id="footer-credits"></div>
    <button id="btn-install-help" class="footer-link" type="button"></button>
  </footer>

  <script type="module" src="./js/app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./sw.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
